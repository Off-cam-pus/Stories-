<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Chess Odyssey</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="loading-screen" class="overlay-screen">
        <div class="loader-content">
            <i class="fas fa-chess-knight loader-icon"></i>
            <h2>Loading 3D Assets...</h2>
            <div class="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
            <p id="loading-status">Initializing WebGL graphics...</p>
        </div>
    </div>

    <div id="main-menu" class="overlay-screen hidden">
        <div class="menu-card">
            <h1>3D CHESS</h1>
            <p class="subtitle">Experience the Classic Game in Three Dimensions</p>
            
            <div class="menu-options">
                <button id="btn-pvp" class="menu-btn"><i class="fas fa-users"></i> Local Pass & Play</button>
                <button id="btn-ai" class="menu-btn"><i class="fas fa-robot"></i> Play Against AI</button>
                <button id="btn-open-settings" class="menu-btn secondary"><i class="fas fa-cog"></i> Settings</button>
            </div>
        </div>
    </div>

    <main id="game-container" class="hidden">
        
        <section class="side-panel left-panel">
            <div class="player-card" id="player2-card">
                <div class="player-info">
                    <span class="player-name"><i class="fas fa-robot"></i> AI (Black)</span>
                    <div class="chess-clock" id="clock-black">10:00</div>
                </div>
                <div class="captured-box" id="captured-by-black">
                    </div>
            </div>

            <div class="control-cluster">
                <button id="btn-rotate-camera" title="Rotate Camera"><i class="fas fa-sync-alt"></i> Flip View</button>
                <button id="btn-reset-camera" title="Reset View"><i class="fas fa-camera"></i> Reset Cam</button>
                <button id="btn-undo" title="Undo Move" disabled><i class="fas fa-undo"></i> Undo</button>
                <button id="btn-resign" title="Resign Match"><i class="fas fa-flag"></i> Resign</button>
            </div>

            <div class="player-card" id="player1-card">
                <div class="captured-box" id="captured-by-white">
                    </div>
                <div class="player-info">
                    <span class="player-name"><i class="fas fa-user"></i> Player (White)</span>
                    <div class="chess-clock active" id="clock-white">10:00</div>
                </div>
            </div>
        </section>

        <section id="canvas-container">
            <div id="turn-indicator" class="turn-white">White's Turn</div>
        </section>

        <section class="side-panel right-panel">
            <div class="panel-header">
                <h3><i class="fas fa-history"></i> Move Log</h3>
                <button id="btn-menu-settings" class="icon-btn" title="Settings"><i class="fas fa-sliders-h"></i></button>
            </div>
            
            <div id="move-history" class="history-log">
                <div class="history-row header">
                    <span>#</span><span>White</span><span>Black</span>
                </div>
                </div>

            <div class="game-footer-actions">
                <button id="btn-home" class="menu-btn secondary small"><i class="fas fa-home"></i> Main Menu</button>
            </div>
        </section>

    </main>

    <div id="promotion-modal" class="modal-overlay hidden">
        <div class="modal-content promotion-box">
            <h3>Promote Your Pawn</h3>
            <div class="promotion-options">
                <button class="promo-btn" data-piece="queen" title="Queen"><i class="fas fa-chess-queen"></i></button>
                <button class="promo-btn" data-piece="rook" title="Rook"><i class="fas fa-chess-rook"></i></button>
                <button class="promo-btn" data-piece="bishop" title="Bishop"><i class="fas fa-chess-bishop"></i></button>
                <button class="promo-btn" data-piece="knight" title="Knight"><i class="fas fa-chess-knight"></i></button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Game Settings</h2>
                <button id="btn-close-settings" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-group">
                    <label><i class="fas fa-volume-up"></i> Sound Effects</label>
                    <input type="checkbox" id="setting-sound" checked>
                </div>
                
                <div class="setting-group">
                    <label for="setting-theme"><i class="fas fa-palette"></i> Board Style</label>
                    <select id="setting-theme">
                        <option value="classic">Classic Wood</option>
                        <option value="marble">Modern Marble</option>
                        <option value="neon">Cyber Neon</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label for="setting-difficulty"><i class="fas fa-brain"></i> AI Difficulty</label>
                    <select id="setting-difficulty">
                        <option value="easy">Easy (Casual)</option>
                        <option value="medium" selected>Medium (Challenging)</option>
                        <option value="hard">Hard (Grandmaster)</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label for="setting-time"><i class="fas fa-hourglass-half"></i> Time Control</label>
                    <select id="setting-time">
                        <option value="3">3 Minutes (Blitz)</option>
                        <option value="10" selected>10 Minutes (Rapid)</option>
                        <option value="30">30 Minutes (Classical)</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div id="game-over-modal" class="modal-overlay hidden">
        <div class="modal-content match-result-box">
            <h2 id="game-over-title">Checkmate!</h2>
            <p id="game-over-reason">White wins by technical knockout.</p>
            <div class="modal-actions">
                <button id="btn-rematch" class="menu-btn"><i class="fas fa-redo"></i> Rematch</button>
                <button id="btn-quit" class="menu-btn secondary"><i class="fas fa-sign-out-alt"></i> Quit to Menu</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script src="utils.js"></script>
    <script src="sound.js"></script>
    <script src="ui.js"></script>
    <script src="pieces.js"></script>
    <script src="board.js"></script>
    <script src="controls.js"></script>
    <script src="animation.js"></script>
    <script src="ai.js"></script>
    <script src="game.js"></script>
    <script src="script.js"></script>
</body>
</html>
