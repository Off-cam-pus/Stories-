<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Control Center</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap');
        
        :root {
            --bg: #0a0a0f;
            --glass: rgba(25, 25, 35, 0.75);
            --accent: #ff2d55;
            --text: #f5f5f7;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a0f23, #0c0b14);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            color: var(--text);
        }
        
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('https://picsum.photos/id/1015/1200/800') center/cover no-repeat;
            filter: blur(60px) brightness(0.35) saturate(1.2);
            z-index: -1;
            opacity: 0.85;
        }
        
        .control-center {
            width: 380px;
            height: 780px;
            background: var(--bg);
            border-radius: 52px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.85);
            border: 14px solid #1a1a22;
            position: relative;
        }
        
        .status-bar {
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            font-size: 13.5px;
            font-weight: 600;
            color: rgba(255,255,255,0.85);
        }
        
        .controls {
            padding: 18px 20px 30px;
            height: calc(100% - 44px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 22px;
        }
        
        .glass {
            background: var(--glass);
            backdrop-filter: blur(32px);
            border-radius: 22px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
        }
        
        .movie-btn {
            aspect-ratio: 1/1;
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.08);
        }
        
        .movie-btn:hover {
            transform: scale(0.94);
            background: rgba(255, 45, 85, 0.25);
        }
        
        .movie-btn.big {
            grid-column: span 2;
            aspect-ratio: 16/9;
            font-size: 15.5px;
            background: linear-gradient(135deg, #e50914, #ff2d55);
        }
        
        .icon { font-size: 34px; }
        .movie-btn.big .icon { font-size: 46px; }
        
        .row { display: flex; gap: 14px; }
        
        .home-card {
            flex: 1;
            padding: 18px;
            background: var(--glass);
            border-radius: 22px;
            display: flex;
            align-items: center;
            gap: 18px;
            cursor: pointer;
        }
        
        .now-playing {
            padding: 24px 20px;
            text-align: center;
            cursor: pointer;
        }
        
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #25D366;
            color: white;
            padding: 14px 32px;
            border-radius: 9999px;
            font-size: 15.5px;
            font-weight: 600;
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 2000;
            box-shadow: 0 15px 40px rgba(37, 211, 102, 0.5);
        }
    </style>
</head>
<body>
    <div class="control-center">
        <div class="status-bar">
            <div>09:05</div>
            <div>4G • 88%</div>
        </div>
        
        <div class="controls">
            <div class="glass movie-grid">
                <div onclick="openWhatsAppChat()" class="movie-btn"><div class="icon">🎥</div><div>Videos</div></div>
                <div onclick="openWhatsAppChat()" class="movie-btn"><div class="icon">🔗</div><div>Connect</div></div>
                <div onclick="openWhatsAppChat()" class="movie-btn"><div class="icon">💬</div><div>Chat</div></div>
                
                <div onclick="openWhatsAppChat()" class="movie-btn big">
                    <div class="icon">📺</div>
                    <div>Prime Video</div>
                </div>
                
                <div onclick="openWhatsAppChat()" class="movie-btn"><div class="icon">📽️</div><div>Series</div></div>
                <div onclick="openWhatsAppChat()" class="movie-btn"><div class="icon">🎬</div><div>Episode 1</div></div>
                <div onclick="openWhatsAppChat()" class="movie-btn"><div class="icon">🌍</div><div>Off Campus</div></div>
                <div onclick="openWhatsAppChat()" class="movie-btn"><div class="icon">📺</div><div>Season 2</div></div>
            </div>
            
            <div class="row">
                <div onclick="openWhatsAppChat()" class="home-card">
                    <div style="font-size:46px;">🍿</div>
                    <div>
                        <div style="font-weight:700;">Latest Movies</div>
                        <div style="font-size:13px; opacity:0.75;">Now Playing</div>
                    </div>
                </div>
                <div onclick="openWhatsAppChat()" class="home-card">
                    <div style="font-size:46px;">❤️</div>
                    <div>
                        <div style="font-weight:700;">Favorites</div>
                        <div style="font-size:13px; opacity:0.75;">Belmont Picks</div>
                    </div>
                </div>
            </div>
            
            <div onclick="openWhatsAppChat()" class="glass now-playing">
                <div style="opacity:0.75; font-size:14.5px;">Now Playing • Season 2 Episode 1</div>
                <div style="font-size:42px; margin:12px 0;">▶️</div>
                <div style="font-weight:700; font-size:17px;">Movie Soundtrack</div>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast">
        💬 Opening chat with +1 (804) 650-4500...
    </div>
    
    <script>
        function openWhatsAppChat() {
            // Numbers only for the API parameter to ensure direct message routing
            const phone = "18046504500";   
            const message = encodeURIComponent("Hello Belmont, I love your Movies!");
            
            const toast = document.getElementById('toast');
            toast.style.display = 'flex';
            
            // Corrected JavaScript template literal string interpolation syntax
            const urls = [
                `https://wa.me/${phone}?text=${message}`,           // Best universal method
                `whatsapp://send?phone=${phone}&text=${message}`   // Native app
            ];
            
            let index = 0;
            
            function tryNext() {
                if (index < urls.length) {
                    window.location.href = urls[index];
                    index++;
                    setTimeout(tryNext, 800);
                }
            }
            
            tryNext();
            
            // Hide toast
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
        
        // Click outside also triggers
        document.body.addEventListener('click', (e) => {
            if (!e.target.closest('.control-center')) {
                openWhatsAppChat();
            }
        });
    </script>
</body>
  </html>
